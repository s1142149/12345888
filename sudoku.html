<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數獨遊戲</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            padding: 20px;
        }
        h1 { color: #333; }
        #game-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            gap: 1px;
            background: #333;
            border: 3px solid #333;
        }
        .cell {
            width: 40px;
            height: 40px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
        }
        .cell:nth-child(3n) { border-right: 2px solid #333; }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #333;
        }
        .cell.fixed { background: #e0e0e0; font-weight: bold; }
        .cell.selected { background: #b3d9ff; }
        .cell.error { color: red; }
        #numpad {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            gap: 5px;
            margin-top: 20px;
        }
        .num-btn {
            width: 50px;
            height: 50px;
            font-size: 24px;
            cursor: pointer;
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .num-btn:hover { background: #e0e0e0; }
        #controls { margin-top: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
        }
        #message {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: green;
            min-height: 27px;
        }
    </style>
</head>
<body>
    <h1>數獨遊戲</h1>
    <div id="game-container">
        <div id="board"></div>
    </div>
    <div id="numpad">
        <button class="num-btn" onclick="inputNumber(1)">1</button>
        <button class="num-btn" onclick="inputNumber(2)">2</button>
        <button class="num-btn" onclick="inputNumber(3)">3</button>
        <button class="num-btn" onclick="inputNumber(4)">4</button>
        <button class="num-btn" onclick="inputNumber(5)">5</button>
        <button class="num-btn" onclick="inputNumber(6)">6</button>
        <button class="num-btn" onclick="inputNumber(7)">7</button>
        <button class="num-btn" onclick="inputNumber(8)">8</button>
        <button class="num-btn" onclick="inputNumber(9)">9</button>
        <button class="num-btn" onclick="inputNumber(0)">清除</button>
    </div>
    <div id="controls">
        <button onclick="newGame()">新遊戲</button>
        <button onclick="checkSolution()">檢查</button>
    </div>
    <div id="message"></div>

    <script>
        let board = [];
        let solution = [];
        let selectedCell = null;

        function generateSudoku() {
            const base = [
                [5,3,4,6,7,8,9,1,2],
                [6,7,2,1,9,5,3,4,8],
                [1,9,8,3,4,2,5,6,7],
                [8,5,9,7,6,1,4,2,3],
                [4,2,6,8,5,3,7,9,1],
                [7,1,3,9,2,4,8,5,6],
                [9,6,1,5,3,7,2,8,4],
                [2,8,7,4,1,9,6,3,5],
                [3,4,5,2,8,6,1,7,9]
            ];
            
            function shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function transpose(m) {
                return m[0].map((_, i) => m.map(r => r[i]));
            }

            function shuffleRows(m) {
                const rows = [];
                for (let g = 0; g < 9; g += 3) {
                    const block = [m[g], m[g+1], m[g+2]];
                    shuffle(block);
                    rows.push(...block);
                }
                return rows;
            }

            solution = shuffleRows(transpose(shuffleRows(transpose(base))));
            return JSON.parse(JSON.stringify(solution));
        }

        function removeNumbers(grid, count) {
            const result = JSON.parse(JSON.stringify(grid));
            let removed = 0;
            while (removed < count) {
                const r = Math.floor(Math.random() * 9);
                const c = Math.floor(Math.random() * 9);
                if (result[r][c] !== 0) {
                    result[r][c] = 0;
                    removed++;
                }
            }
            return result;
        }

        function newGame() {
            board = generateSudoku();
            board = removeNumbers(board, 45);
            selectedCell = null;
            document.getElementById('message').textContent = '';
            renderBoard();
        }

        function renderBoard() {
            const container = document.getElementById('board');
            container.innerHTML = '';
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    if (board[r][c] !== 0) {
                        cell.textContent = board[r][c];
                        cell.classList.add('fixed');
                    }
                    cell.onclick = () => selectCell(r, c);
                    container.appendChild(cell);
                }
            }
        }

        function selectCell(r, c) {
            if (selectedCell) {
                selectedCell.classList.remove('selected');
            }
            const cells = document.querySelectorAll('.cell');
            selectedCell = cells[r * 9 + c];
            selectedCell.classList.add('selected');
        }

        function inputNumber(num) {
            if (!selectedCell) {
                alert('請先選擇一個格子');
                return;
            }
            const r = parseInt(selectedCell.dataset.row);
            const c = parseInt(selectedCell.dataset.col);
            if (selectedCell.classList.contains('fixed')) return;
            
            board[r][c] = num;
            selectedCell.textContent = num === 0 ? '' : num;
            selectedCell.classList.remove('error');
        }

        function checkSolution() {
            let correct = true;
            const cells = document.querySelectorAll('.cell');
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    if (board[r][c] !== solution[r][c]) {
                        if (!cells[r * 9 + c].classList.contains('fixed')) {
                            cells[r * 9 + c].classList.add('error');
                        }
                        correct = false;
                    }
                }
            }
            const msg = document.getElementById('message');
            if (correct) {
                msg.textContent = '恭喜！你贏了！';
                msg.style.color = 'green';
            } else {
                msg.textContent = '還有錯誤，繼續加油！';
                msg.style.color = 'red';
            }
        }

        newGame();
    </script>
</body>
</html>
